- tag: creativity
  goals: >-
    Assign this key when the human explicitly treats an idea as a
    kernel or prompt for creative writing — e.g. they say "that would
    make a good story", are brainstorming fiction, or are developing
    characters, plots, or scenes. Do NOT assign this tag for
    incidental literary references, citations of authors or books used
    to frame a point in another discussion, or conversations that
    merely sound literary.
  example: >-
    Good: The human says "the way those two coworkers clash would make
    an interesting short story" → tag: creative_writing.
    Bad (do NOT tag as creative_writing): The human references Asimov's
    Susan Calvin to illustrate a point about AI-as-collaborator. The
    reference is a citation supporting a philosophical argument, not a
    story idea — this belongs under `humanity` or `project`, not
    creative_writing.

- tag: project
  goals: >-
    Assign this key when the conversation involves a specific project
    (new or existing). Set qualifier to the project name if one is
    mentioned or can be inferred, or "new:<suggested_name>" if the
    human is brainstorming a new project idea.
  example: >-
    The human is discussing a todo item for their journal_agent project →
    tag: project, qualifier: journal_agent.
    The human is brainstorming a recipe app →
    tag: project, qualifier: new:recipe_app.

- tag: humanity
  goals: >-
    Assign this key to conversations about philosophy, spirituality, and human
    psychology — including the nature of human experience,
    consciousness, free will, meaning, narrative, belief, chaos,
    solitude, and what it means to be human. Also applies to
    philosophical reflections on AI-and-human relations (e.g. whether
    AI can be a collaborator, whether AI will inherit human flaws,
    whether human perception is "just programming we believe because
    it is our narrative") — these sit squarely under philosophy of
    humanity, even when the literal subject word is "AI".
  example: >-
    The human and AI are discussing subjects related to the state of
    human existence, Stoicism, Buddhism, cognitive behavior, the
    philosophy of mind, or whether an artificial intelligence could
    truly understand the human condition.

- tag: music
  goals: >-
    Assign this key to conversations about music theory, music performance, music production, music history
  example: >-
    The human and AI are discussing subjects related music performance, musicality, and music theory

- tag: health
  goals: Assign this key to conversations about health and exercise
  example: >-
    The human and AI are discussing subjects related to exercise, health,
    medical

- tag: relationships
  goals: Assign this key to conversations about the human's family and friends
  example: >-
    The human and AI are discussing family dynamics, friendships,
    social connections, or interpersonal matters

- tag: journal
  goals: Assign this key to conversations about the user's day to day activities
  example: The human and AI are discussing what the subject did during the day

- tag: schedule
  goals: Assign this key to conversations about the user's upcoming tasks
  example: The human and AI are discussing the humans schedule

- tag: personal_goals
  goals: Assign this key to conversations about the user's personal and career goals
  example: >-
    The human and AI are discussing traits, skills and even career and life
    goals that the human aspires to

- tag: technology
  goals: Assign this key to conversations about tools, engineering, software, systems, or any STEM subject
  example: >-
    The human and AI are discussing a software engineering or AI project, or any STEM subject

- tag: finance
  goals: Assign this key to conversations about money, budgeting, investing, economic decisions
  example: >-
    The human and AI are discussing both their own finances and also general economics and finance